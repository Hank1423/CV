<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let letter = prompt("Nhập chữ: ");
        let result = [];
        for (let i=0; i < letter.length; i++) {
            if (letter[i] === letter[i].toUpperCase()) {
                result.push(letter[i].toLowerCase());
            } else {
                result.push(letter[i].toUpperCase());
            }
        }
        console.log(result.join(''))

    </script>
</body>
</html>
