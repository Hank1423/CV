<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let myColor = ["red", "green", "white", "black"];
        let result = "";
        for (let i=0; i < myColor.length; i++){
            result += myColor[i];
            if (i < myColor.length-1) {
                result += ", ";
            }
        }
        alert(result);
    </script>
</body>
</html>
