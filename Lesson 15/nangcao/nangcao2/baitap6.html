<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let arr = ['h', 'e', 'l', '-', 'l', 'o', '-', 'w', 'o', 'r', 'l', 'd'];

        for (let i = 0; i < arr.length; i++) {
            if (arr[i] === '-') {
                arr[i] = '_';
            }
        }

        console.log("Mảng sau khi thay thế:", arr.join(''));
    </script>
</body>

</html>
