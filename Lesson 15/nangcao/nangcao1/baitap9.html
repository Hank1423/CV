<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let a = [];
        let b = [];
        let c = [];

        alert("Nhập 10 phần tử cho mảng a:");
        for (let i = 0; i < 10; i++) a[i] = parseInt(prompt("Mảng a - Phần tử " + (i + 1)));

        alert("Nhập 10 phần tử cho mảng b:");
        for (let i = 0; i < 10; i++) b[i] = parseInt(prompt("Mảng b - Phần tử " + (i + 1)));

        c = b.concat(a);

        alert("Mảng c (nối b và a): " + c.join(", "));
    </script>
</body>

</html>
