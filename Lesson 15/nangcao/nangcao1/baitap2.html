<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr = [];
for (let i = 0; i < 10; i++) {
    arr[i] = parseInt(prompt("Nhập phần tử thứ " + (i + 1)));
}

let max = arr[0];
let index = 0;

for (let i = 1; i < arr.length; i++) {
    if (arr[i] > max) {
        max = arr[i]; 
        index = i;
    }
}

alert("Mảng bạn vừa nhập: " + arr.join(", "));
alert("Phần tử lớn nhất trong mảng là: " + max + " tại vị trí index: " + index);
    </script>
</body>
</html>
