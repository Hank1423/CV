<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let arr = [];
        for (let i = 0; i < 10; i++) {
            arr[i] = parseInt(prompt("Nhập phần tử thứ " + (i + 1)));
        }

        let V = parseInt(prompt("Nhập số nguyên V cần tìm:"));
        if (arr.includes(V)) {
            alert("V is in the array");
        } else {
            alert("V is not in the array");
        }
    </script>
</body>

</html>
