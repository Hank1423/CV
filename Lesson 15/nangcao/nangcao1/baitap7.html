<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let arr = [];
        for (let i = 0; i < 10; i++) {
            arr[i] = parseInt(prompt("Nhập phần tử thứ " + (i + 1)));
        }

        let V = parseInt(prompt("Nhập số nguyên V cần xóa:"));
        let indexV = arr.indexOf(V);

        if (indexV !== -1) {
            for (let i = indexV; i < arr.length - 1; i++) {
                arr[i] = arr[i + 1];
            }
            arr[arr.length - 1] = 0;
            alert("V đã được xóa. Mảng mới: " + arr.join(", "));
        } else {
            alert("V không nằm trong mảng.");
        }
    </script>
</body>

</html>
