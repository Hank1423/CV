<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="card">
            <h2 class="card-title">Good - Cheap - Fast</h2>

            <div class="switch-item">
                <input type="checkbox" id="good" onclick="check('good')">
                <span class="label-name">GOOD</span>
            </div>

            <div class="switch-item">
                <input type="checkbox" id="fast" onclick="check('fast')">
                <span class="label-name">FAST</span>
            </div>

            <div class="switch-item">
                <input type="checkbox" id="cheap" onclick="check('cheap')">
                <span class="label-name">CHEAP</span>
            </div>
        </div>
    </div>
    <script src="G-F-C.js"></script>
</body>

</html>
