<body>
    <script>
        let a = +prompt("Nhập số a: ")
        if (a > 0) {
            let s = a * a;
            console.log("Diện tích hình vuông: " + s);
        } else {
            console.log("Cạnh phải lớn hơn 0");
        }
    </script>
