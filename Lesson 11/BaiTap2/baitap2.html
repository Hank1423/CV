<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let m = 1.8;
        let ft = m * 3.2808;

        console.log(`Chiều cao của bạn là: ${ft.toFixed(2)} ft`);

        if (ft < 5) {
            console.log("Phân loại: Thấp");
        } else if (ft < 6) {
            console.log("Phân loại: Trung bình");
        } else {
            console.log("Phân loại: Cao");
        }
    </script>
</body>

</html>
