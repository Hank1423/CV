<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let age = +prompt("Nhập số tuổi: ");
        if (Number.isInteger(age) && age > 0 && age < 120) {
            console.log("Đây là tuổi của một người");
        } else {
            console.log("Không phải tuổi người");
        }
    </script>
</body>

</html>
