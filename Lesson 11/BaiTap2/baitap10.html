<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let kwh = 150;
        let money = 0;
        if (kwh <= 50){
            money = kwh * 1678;
        } else {
            if (kwh <= 100){
                money = 50 * 1678 + (kwh - 50) * 1734;
            } else {
                money = 50 * 1678 + 50 * 1734 + (kwh - 100) * 2014;
            }
        }
        console.log("Tiền điện: " + money + " VNĐ");
    </script>
</body>
</html>
