<body>
    <script>
        let income = 15000000;
        let tax = 0;

        if (income <= 5000000) {
            tax = income * 0.05;
        } else if (income <= 10000000) {
            tax = income * 0.1 - 250000;
        } else {
            tax = income * 0.15 - 750000;
        }

        console.log("Thuế phải nộp: " + tax);
    </script>
