<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = +prompt("Nhập dãy Fibonacci mong muốn");
        let a = 0, b = 1;
        let result = "";
        for (let i = 1; i <= n; i++){
            result += b + " ";
            let next = a + b;
            a = b;
            b = next;
        }
        console.log("Dãy Fibonacci: " + result);
    </script>
</body>
</html>
