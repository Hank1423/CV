<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let r = 7;
        let c = 20;
        for (let i = 1; i <= r; i++){
            for (let j = 1; j <= c; j++){
                if (i === 1 || i === r || j === 1 || j === c){
                    document.write("*");
                } else {
                    document.write("&nbsp;&nbsp;")
                }
            }
            document.write("<br>");
        }
    </script>
</body>
</html>
