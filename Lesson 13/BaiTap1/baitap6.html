<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let count = 0;
        let sum = 0;
        let i = 1;
        while (count < 30) {
            if (i % 7 === 0) {
                sum += i;
                count++;
                console.log(count);
            }
            i++;
        }
        console.log("Tổng 30 số đầu tiên chia hết cho 7 là: " + sum);
    </script>
</body>

</html>
