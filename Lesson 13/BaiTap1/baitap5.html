<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let a = 0, b = 1, sum = 1;
        for (let i = 2; i <= 20; i++) {
            let next = a + b;
            console.log(next);
            sum += next;
            a = b;
            b = next;
        }
        console.log("Tổng 20 số Fibonacci đầu tiên: " + sum);
    </script>
</body>

</html>
