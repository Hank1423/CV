<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <h2>Quản lý sản phẩm</h2>
        
        <div class="input-group">
            <input id="product-name" placeholder="Nhập tên sản phẩm mới...">
            <button id="btn-product" onclick="addProduct()">Thêm mới</button>
        </div>

        <div id="product-list">
            <table>
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên sản phẩm</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
