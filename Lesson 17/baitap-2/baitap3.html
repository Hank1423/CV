<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>Tính giai thừa</h3>
    <input type="number" id="inputN" placeholder="Nhập số: " oninput="giaithua()">
    <p id="result"></p>
    <script>
        function tinhgiaithua(n) {
            if (n < 0) return "Không tính được giai thừa số âm";
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }

        function giaithua() {
            let n = +document.getElementById("inputN").value;
            let result = tinhgiaithua(n);
            document.getElementById("result").innerHTML = "Kết quả " + result;

        }
    </script>
</body>

</html>
