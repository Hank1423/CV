<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="input" maxlength="1" placeholder="Nhập 1 kí tự" oninput="check()">
    <p id="result"></p>
    <script>
        function check(){
            let val = document.getElementById("input").value;
            let resultElement = document.getElementById("result");
            if (val === "") {
                resultElement.innerHTML = "";
                return ;
            }
            if (val >= '0' && val <= '9'){
                resultElement.innerHTML = "<span style = 'color: green;'> Đây là kí tự số </span>";
            } else {
                resultElement.innerHTML = "<span style = 'color: red;'> Đây không phải kí tự số </span>";
            }
        }
    </script>
</body>
</html>
